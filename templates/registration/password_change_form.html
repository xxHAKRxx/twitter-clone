{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Change Password{% endblock title %}

{% block content %}
    <h1>Change Your Password</h1>
    <p>Think you password is too weak or hard to remember? Change it here!</p>

    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <input type="submit" class="btn btn-success" value="Change Password">
    </form>
{% endblock content %}
