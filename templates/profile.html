{% extends "base.html" %}

{% block title %}Profile{% endblock title %}

{% block content %}
    <h1>{{ user.username }}'s Profile</h1>
    {% for twit in twit.author.all %}
        <div class="twit-entry">
            <p>{{ twit.body }}</p>
            {% if twit.image_url %}
                <img src="{{ twit.image_url }}" alt="ERROR: Image not found" class="img-fluid mt-2">
            {% endif %}
        </div>
    {% endfor %}
{% endblock content %}
