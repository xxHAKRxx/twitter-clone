{% extends "base.html" %}

{% block title %}Twit Viewer{% endblock title %}

{% block content %}
    <div class="twit-entry">
        <h2>{{ twit.author }}</h2>
        <p>{{ twit.body }}</p>
        {% if twit.image_url %}
            <img src="{{ twit.image_url }}" alt="ERROR: Image not found" class="img-fluid ml-2">
        {% endif %}
    </div>
    <p>
        <a href="#">Comments</a> | 
        <a href="#">Likes</a>
    </p>
{% endblock content %}
