{% extends "base.html" %}

{% block title %}Twit Viewer{% endblock title %}

{% block content %}
    <div class="twit-entry">
        <h2>{{ twit.author }}</h2>
        <p>{{ twit.body }}</p>
        {% if twit.image_url %}
            <img src="{{ twit.image_url }}" alt="ERROR: Image not found" class="img-fluid ml-2">
        {% endif %}
    </div>
    
    <h3>Comments</h3>
    <hr>
    {% for comment in twit.comments.all %}
        <p>{{ comment.author }}</p>
        <p>{{ comment.body }}</p>
        <hr>
    {% endfor %}    
{% endblock content %}
